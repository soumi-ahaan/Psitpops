<!doctype html>
<html>
  <head>
    <title>All Topics</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Darker+Grotesque:wght@300..900&display=swap%22"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/announcement.css" />
    <link rel="stylesheet" href="/css/index.css" />
  </head>

  <body class="bg-[#f5f5f5]">
    <div id="announcement"></div>
    <div class="relative">
      <header id="header" class="absolute top-0 z-50 w-full py-4"></header>
      <div id="alltopicBanner"></div>
    </div>

    <section class="py-20 px-[10%] bg-[#F7F4EF]">
      <h1 class="text-6xl font-extrabold text-center mb-5 font-darker text-[#1F2A44]"> Topics</h1>

              <p
          class="font-medium lg:text-[20px] md:text-[16px] text-sm text-gray-500 mb-12 text-center"
        >
          Weekly reflections to encourage your spiritual journey.
        </p>

      <!-- GRID -->
      <div
        id="allTopicsGrid"
        class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-y-10 gap-x-6 justify-items-center"
      ></div>
    </section>

    <!-- TEMPLATE -->
    <template id="allTopicTemplate">
      <a class="block relative rounded-xl overflow-hidden group topic-card">
        <img class="w-full h-56 object-cover topic-image" />

        <div class="absolute inset-0 bg-black/40"></div>

        <h3
  class="absolute bottom-4 w-full text-center text-white text-xl font-semibold topic-title"
></h3>
      </a>
    </template>

    <div id="footer"></div>
    <script src="js/header.js"></script>
    <script src="/js/main.js" defer></script>
    <script src="/js/blog.js" defer></script>
    <script src="js/allTopics.js"></script>
    <script src="/js/search.js"></script>
  </body>
</html>
