<!DOCTYPE html>
<html>

<head>
    <title>PsitPops</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Darker+Grotesque:wght@300..900&display=swap%22" rel="stylesheet">
    <link rel="stylesheet" href="/css/announcement.css">
    <link rel="stylesheet" href="/css/index.css">

</head>

<body class="font-dm">
    <div id="announcement"></div>
    <div class="relative">
        <header id="header" class="absolute top-0 z-50 w-full py-4"></header>
        <div id="banner"></div>
    </div>
    <div id="floating"></div>
    <div class="bg-[#1F2A44] xl:p-20 lg:p-15 md:p-10 p-6">
        <div class="max-w-[1440px] mx-auto">
            <div class="text-center lg:mb-[50px] md:mb-[40px] mb-8">
                <h2
                    class="font-bold text-white text-[28px] md:text-[40px] lg:text-[55px] leading-[50px] md:leading-[75px] tracking-[0]">
                    Featured Devotionals
                </h2>

                <p class="font-medium lg:text-[20px] md:text-[16px] text-sm leading-[20px] text-[#d1d1d1]">
                    Weekly reflections to encourage your spiritual journey.
                </p>
            </div>
            <div id="card-row" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            <div class="text-center mt-12">
                <button class="bg-[#C9A227] text-white px-[30px] py-[15px] rounded-[10px] font-semibold cursor-pointer">
                    View All Articles
                </button>
            </div>
        </div>
    </div>
    <div id="explore"></div>
    <div id="footer"></div>
    <script src="/js/main.js" defer></script>
    <script src="/js/blog.js" defer></script>

</body>

</html>
