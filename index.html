<!DOCTYPE html>
<html>

<head>
    <title>PsitPops</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Darker+Grotesque:wght@300..900&display=swap%22"
        rel="stylesheet">
    <link rel="stylesheet" href="/announcement.css">
    <link rel="stylesheet" href="/css/index.css">
</head>

<body class="font-dm">
    <div id="announcement"></div>
    <div class="relative">
        <div id="header"></div>
        <div id="banner"></div>
    </div>
    <div id="floating"></div>
    <div class="bg-[#1F2A44] lg:p-20 md:p-12 p-5">
        <div class="max-w-[1440px] mx-auto">
            <div class="text-center lg:mb-[50px] md:mb-[40px] mb-8">
                <h2
                    class="font-bold text-white text-[28px] md:text-[40px] lg:text-[55px] leading-[50px] md:leading-[75px] tracking-[0]">
                    Featured Devotionals
                </h2>

                <p class="font-medium lg:text-[20px] md:text-[16px] text-sm leading-[20px] text-[#d1d1d1]">
                    Weekly reflections to encourage your spiritual journey.
                </p>
            </div>
            <div id="card-row" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            <div class="text-center mt-12">
                <button class="bg-[#C9A227] text-white px-[30px] py-[15px] rounded-[10px] font-semibold cursor-pointer">
                    View All Articles
                </button>
            </div>
        </div>
    </div>
    <div id="explore"></div>
    <div id="footer"></div>
    <script src="/js/main.js"></script>
    <script src="/js/blog.js"></script>

</body>

</html>
